# Default values for fusionpbx.

global:
  domain: example.com

persistence:
  enabled: true
  storageClass: ""
  # volumes configuration
  volumes:
    web:
      size: 5Gi
      accessMode: ReadWriteMany
    freeswitchData:
      size: 5Gi
      accessMode: ReadWriteOnce
    freeswitchMedia:
      size: 10Gi
      accessMode: ReadWriteMany
    freeswitchConf:
      size: 2Gi
      accessMode: ReadWriteMany
    logs:
      size: 5Gi
      accessMode: ReadWriteMany
    letsencrypt:
      size: 1Gi
      accessMode: ReadWriteMany

memcached:
  enabled: true
  image:
    repository: memcached
    tag: alpine
  replicaCount: 1

postgresql:
  # Set to true to deploy PostgreSQL within the cluster
  # Set to false to use an external PostgreSQL database
  enabled: true
  image:
    repository: postgres
    tag: 17-alpine
  auth:
    username: fusionpbx
    password: fusionpbx_password
    database: fusionpbx
  # If enabled is false, define external database details here
  external:
    host: external-db.example.com
    port: 5432
    username: fusionpbx
    password: fusionpbx_password
    database: fusionpbx
  
  # Existing secret configuration (e.g. for CNPG)
  secret:
    name: "" # If defined, uses this existing secret instead of auth/external
    keys:
      host: host
      port: port
      username: username
      password: password
      database: database

nginx:
  replicaCount: 1
  image:
    repository: nginx
    tag: alpine
  
phpFpm:
  replicaCount: 1
  image:
    repository: ghcr.io/eu-arthur/php-fpm-fusionpbx
    tag: "latest"

freeswitch:
  # Set replicaCount > 1 for High Availability (HA)
  replicaCount: 2
  image:
    repository: ghcr.io/eu-arthur/freeswitch-fusionpbx
    tag: "latest"
  capAdd:
    - SYS_RESOURCE
    - SYS_NICE
    - IPC_LOCK

kamailio:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/kamailio/kamailio
    tag: "latest"
  service:
    type: LoadBalancer
